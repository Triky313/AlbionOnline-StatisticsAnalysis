name: "🔥 Create release assets by newest tag"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  build-application:
    name: Build and release application
    runs-on: windows-latest
    env:
      Project_File_Path: src\StatisticsAnalysisTool\StatisticsAnalysisTool.csproj
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      SPARKLE_PUBLIC_KEY: ${{ vars.SPARKLE_PUBLIC_KEY || secrets.SPARKLE_PUBLIC_KEY }}
      AUTHENTICODE_PUBLISHER_THUMBPRINT: ${{ vars.AUTHENTICODE_PUBLISHER_THUMBPRINT || secrets.AUTHENTICODE_PUBLISHER_THUMBPRINT }}

    steps:
      - name: "🛒 Checkout tagged commit"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🧰 Setup .NET 10 SDK"
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          global-json-file: src/global.json

      - name: "🚧 Prepare release variables"
        id: release_variables
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          $rawVersion = $tagName.TrimStart("v")
          $versionAndMetadata = $rawVersion -split "\+", 2
          $version = $versionAndMetadata[0]
          $metadataParts = [System.Collections.Generic.List[string]]::new()

          if ($versionAndMetadata.Count -gt 1)
          {
              foreach ($metadataPart in $versionAndMetadata[1].Split(".", [System.StringSplitOptions]::RemoveEmptyEntries))
              {
                  $metadataParts.Add($metadataPart)
              }
          }

          if ($version -match "^(?<version>.+)-both$")
          {
              $version = $Matches["version"]
              $metadataParts.Add("both")
          }

          $isBothAppCast = $metadataParts -contains "both"
          $isPreRelease = $version -match "-(alpha|beta|rc)([.-].*)?$"
          if ($version.Contains("-") -and !$isPreRelease)
          {
              throw "Pre-release tags must use an alpha, beta, or rc suffix. Invalid tag: '$tagName'."
          }

          $appCastMode = if ($isBothAppCast) { "both" } elseif ($isPreRelease) { "pre-release" } else { "release" }
          $artifactTagName = "v$version"
          $branchSafeTag = $tagName -replace "[^A-Za-z0-9._-]", "-"
          $versionInfoMatch = [regex]::Match($version, "^\d+(?:\.\d+){0,3}")
          if (!$versionInfoMatch.Success)
          {
              throw "Tag '$tagName' does not start with a valid numeric version."
          }

          $versionInfoParts = $versionInfoMatch.Value.Split(".")
          while ($versionInfoParts.Count -lt 4)
          {
              $versionInfoParts += "0"
          }

          $versionInfo = [string]::Join(".", $versionInfoParts[0..3])

          "TAG_NAME=$tagName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION_INFO=$versionInfo" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APPCAST_MODE=$appCastMode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_ARTIFACT_TAG_NAME=$artifactTagName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APPCAST_BRANCH=release/appcast-$branchSafeTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          "tag-name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "app-version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "app-version-info=$versionInfo" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "appcast-mode=$appCastMode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact-tag-name=$artifactTagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "appcast-branch=release/appcast-$branchSafeTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: "🔐 Validate NetSparkle signing configuration"
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SPARKLE_PUBLIC_KEY))
          {
              throw "SPARKLE_PUBLIC_KEY is required as a repository variable or secret."
          }

          if ([string]::IsNullOrWhiteSpace($env:SPARKLE_PRIVATE_KEY))
          {
              throw "SPARKLE_PRIVATE_KEY is required as a repository secret."
          }

      - name: "🛠 Publish StatisticsAnalysisTool application"
        shell: pwsh
        run: |
          dotnet publish $env:Project_File_Path `
            -c Release `
            -p:Platform=x64 `
            -p:PublishDir=bin\Release\publish\ `
            -p:PublishProtocol=FileSystem `
            -p:TargetFramework=net10.0-windows `
            -p:RuntimeIdentifier=win-x64 `
            -p:SelfContained=false `
            -p:PublishSingleFile=true `
            -p:PublishReadyToRun=false `
            -p:RequireNetSparkleEd25519PublicKey=true `
            -p:NetSparkleEd25519PublicKey=$env:SPARKLE_PUBLIC_KEY

      - name: "🔎 Verify embedded NetSparkle public key"
        shell: pwsh
        run: |
          $generatedSecurityFile = "src\StatisticsAnalysisTool\obj\x64\Release\Generated\AutoUpdateSecurityBuildSettings.g.cs"
          if (!(Test-Path -LiteralPath $generatedSecurityFile))
          {
              throw "Generated NetSparkle security settings file was not created."
          }

          $content = Get-Content -LiteralPath $generatedSecurityFile -Raw
          if ($content -match 'Ed25519PublicKey\s*=\s*""')
          {
              throw "NetSparkle public key was not embedded into the release build."
          }

          if ($content -notmatch 'IsSignatureVerificationRequired\s*=\s*true')
          {
              throw "NetSparkle signature verification is not required in the release build."
          }

      - name: "📦 Create release zip file"
        uses: vimtor/action-zip@v1
        with:
          files: src\StatisticsAnalysisTool\bin\Release\publish
          dest: StatisticsAnalysis-AlbionOnline-${{ steps.release_variables.outputs.artifact-tag-name }}-windows-x64.zip

      - name: "🧱 Build release setup file"
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: .github/installers/release-installer.iss
          options: /DMyAppVersion=${{ steps.release_variables.outputs.app-version }} /DMyAppVersionInfo=${{ steps.release_variables.outputs.app-version-info }}

      - name: "🚀 Upload release files to newest tag"
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            StatisticsAnalysis-AlbionOnline-${{ steps.release_variables.outputs.artifact-tag-name }}-windows-x64.zip
            StatisticsAnalysis-AlbionOnline-${{ steps.release_variables.outputs.artifact-tag-name }}-windows-x64.exe

      - name: "💾 Preserve installer for appcast signing"
        shell: pwsh
        run: |
          $installerName = "StatisticsAnalysis-AlbionOnline-$env:APP_ARTIFACT_TAG_NAME-windows-x64.exe"
          $targetPath = Join-Path $env:RUNNER_TEMP $installerName

          Copy-Item -LiteralPath $installerName -Destination $targetPath -Force
          "APPCAST_INSTALLER_PATH=$targetPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: "🔁 Checkout main for appcast pull request"
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: "✨ Install NetSparkle appcast tool"
        shell: pwsh
        run: |
          $netSparkleToolDirectory = Join-Path $env:RUNNER_TEMP "netsparkle-appcast-tool"
          dotnet tool install `
            --tool-path $netSparkleToolDirectory `
            NetSparkleUpdater.Tools.AppCastGenerator `
            --version 2.9.0

          $netSparkleToolPath = Join-Path $netSparkleToolDirectory "netsparkle-generate-appcast.exe"
          "NETSPARKLE_APPCAST_TOOL=$netSparkleToolPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: "🖊 Generate signed NetSparkle appcast"
        id: generate_appcast
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          $appCastFiles = switch ($env:APPCAST_MODE)
          {
              "both" { @("ao-netsparkle-update-check.xml", "ao-netsparkle-pre-release-update-check.xml") }
              "pre-release" { @("ao-netsparkle-pre-release-update-check.xml") }
              default { @("ao-netsparkle-update-check.xml") }
          }
          $appCastAddPaths = [System.Collections.Generic.List[string]]::new()

          foreach ($appCastFile in $appCastFiles)
          {
              .\.github\scripts\New-NetSparkleAppCast.ps1 `
                -TagName $env:TAG_NAME `
                -Version $env:APP_VERSION `
                -InstallerPath $env:APPCAST_INSTALLER_PATH `
                -Repository "${{ github.repository }}" `
                -OutputDirectory src\StatisticsAnalysisTool `
                -AppCastFileName $appCastFile `
                -ToolPath $env:NETSPARKLE_APPCAST_TOOL

              $appCastAddPaths.Add("src/StatisticsAnalysisTool/$appCastFile")
              $appCastAddPaths.Add("src/StatisticsAnalysisTool/$appCastFile.signature")
          }

          "add-paths<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $appCastAddPaths | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: "🔃 Create appcast update pull request"
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.release_variables.outputs.appcast-branch }}
          delete-branch: true
          commit-message: Update NetSparkle appcast for ${{ steps.release_variables.outputs.tag-name }}
          title: Update NetSparkle appcast for ${{ steps.release_variables.outputs.tag-name }}
          body: |
            Updates the NetSparkle appcast for `${{ steps.release_variables.outputs.tag-name }}`.

            Appcast mode: `${{ steps.release_variables.outputs.appcast-mode }}`.

            The GitHub release assets have already been uploaded. Merging this PR makes the update visible to the in-app updater.
          add-paths: ${{ steps.generate_appcast.outputs.add-paths }}
